<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Portal do Aluno - Estudo Digital</title>
<link href="[https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap](https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap)" rel="stylesheet"/>

<script type="module">
import { initializeApp } from '[https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js](https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js)';
import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, getDocs } from '[https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js](https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js)';

const FB_CONFIG = {
  apiKey:"AIzaSyB2Y6Uggohrp8hMPIa3GyPqgqyOygRA0SU",
  authDomain:"professor-digital-8f792.firebaseapp.com",
  projectId:"professor-digital-8f792",
  storageBucket:"professor-digital-8f792.firebasestorage.app",
  messagingSenderId:"4515274923",
  appId:"1:4515274923:web:25e9bc6d350a411972d7ee"
};

let _db = null;
let turmasPublicas = [];
let provasPublicadas = [];
let metadadosAtividades = {};
let provaAtual = null;
let anexosProva = {}; 
let isCadastroPin = false; 
let ALUNO = { id: null, nome: '', turmaId: '', turmaNome: '', disciplina: '', realPin: '', atividadesOffline: {} };

try {
    const app = initializeApp(FB_CONFIG);
    _db = getFirestore(app);
    carregarConfiguracoesIniciais();
} catch(e) {
    document.getElementById('login-loading').innerHTML = '<span style="color:red">Erro de conexão com o servidor. Atualize a página.</span>';
}

async function carregarConfiguracoesIniciais(){
    try {
        const snapCfg = await getDoc(doc(_db, 'publico', 'config'));
        if(snapCfg.exists() && snapCfg.data().config){
            const cfg = JSON.parse(snapCfg.data().config);
            document.documentElement.style.setProperty('--verde', cfg.corP || '#1A4A2E');
            document.documentElement.style.setProperty('--ouro', cfg.corS || '#D4AF37');
            document.getElementById('prof-nome').textContent = cfg.profNome || 'Professor';
            document.getElementById('sys-nome').textContent = cfg.sysNome || 'Portal de Treinamento';
            document.title = 'Portal - ' + (cfg.profNome || 'Estudo');
        }
        
        const snap = await getDoc(doc(_db, 'publico', 'turmas'));
        if(snap.exists() && snap.data().turmas){
            turmasPublicas = JSON.parse(snap.data().turmas);
            const selTurma = document.getElementById('sel-turma');
            turmasPublicas.forEach(t => { selTurma.innerHTML += `<option value="${t.id}">${t.nome}</option>`; });
            
            document.getElementById('login-loading').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
            
            const salvo = localStorage.getItem('aluno_lms_sessao');
            if(salvo){ ALUNO = JSON.parse(salvo); abrirMural(); }
        } else {
            document.getElementById('msg-erro-conexao').innerHTML = 'O professor ainda não publicou as turmas.';
        }
    } catch(e) {
        document.getElementById('msg-erro-conexao').innerHTML = '<span style="color:red">Falha ao buscar dados: ' + e.message + '</span>';
    }
}

window.carregarAlunos = function(){
    const tid = document.getElementById('sel-turma').value;
    const selAluno = document.getElementById('sel-aluno');
    document.getElementById('box-pin').style.display = 'none';
    document.getElementById('btn-login-aluno').style.display = 'none';
    document.getElementById('aluno-pin').value = '';
    
    if(!tid){ selAluno.innerHTML = '<option value="">Aguardando turma...</option>'; selAluno.disabled = true; return; }
    
    const t = turmasPublicas.find(x => x.id === tid);
    if(t && t.alunos && t.alunos.length > 0){
        const ordenados = [...t.alunos].sort((a,b)=>a.nome.localeCompare(b.nome));
        selAluno.innerHTML = '<option value="">Selecione o seu nome...</option>' + ordenados.map(a => `<option value="${a.id}">${a.nome}</option>`).join('');
        selAluno.disabled = false;
    } else {
        selAluno.innerHTML = '<option value="">Nenhum aluno matriculado nesta turma.</option>'; selAluno.disabled = true;
    }
};

window.mostrarPin = async function() {
    const aid = document.getElementById('sel-aluno').value;
    const boxPin = document.getElementById('box-pin');
    const btn = document.getElementById('btn-login-aluno');
    document.getElementById('aluno-pin').value = '';
    
    if(!aid) { boxPin.style.display = 'none'; btn.style.display = 'none'; return; }
    
    boxPin.style.display = 'none';
    btn.style.display = 'none';
    
    try {
        const snap = await getDoc(doc(_db, 'lms_senhas', aid));
        isCadastroPin = !snap.exists(); 
        
        if(isCadastroPin){
            document.getElementById('lbl-pin').textContent = '3. CRIE UMA SENHA (PIN DE 4 NÚMEROS)';
            document.getElementById('lbl-pin').style.color = 'var(--ouro)';
            btn.textContent = 'Cadastrar Senha e Acessar →';
        } else {
            document.getElementById('lbl-pin').textContent = '3. DIGITE SUA SENHA (PIN)';
            document.getElementById('lbl-pin').style.color = 'var(--muted)';
            btn.textContent = 'Acessar Painel →';
            ALUNO.realPin = snap.data().pin;
        }
        boxPin.style.display = 'block';
        btn.style.display = 'flex';
    } catch(e) {
        alert('Erro ao verificar acesso. Detalhes: ' + e.message);
    }
};

window.entrarMural = async function(){
    const tid = document.getElementById('sel-turma').value;
    const aid = document.getElementById('sel-aluno').value;
    const pinDigitado = document.getElementById('aluno-pin').value.trim();
    
    if(!tid || !aid){ alert('Por favor, selecione a sua turma e o seu nome.'); return; }
    if(!pinDigitado || pinDigitado.length < 4){ alert('Sua senha deve ter exatamente 4 números.'); return; }
    
    document.getElementById('btn-login-aluno').disabled = true;
    document.getElementById('btn-login-aluno').textContent = 'Acessando...';

    if(isCadastroPin) {
        try {
            await setDoc(doc(_db, 'lms_senhas', aid), { pin: pinDigitado });
            ALUNO.realPin = pinDigitado;
        } catch(e) {
            document.getElementById('btn-login-aluno').disabled = false;
            document.getElementById('btn-login-aluno').textContent = 'Cadastrar Senha e Acessar →';
            return alert('Erro ao salvar a sua senha.');
        }
    } else {
        if(pinDigitado !== ALUNO.realPin) {
            document.getElementById('btn-login-aluno').disabled = false;
            document.getElementById('btn-login-aluno').textContent = 'Acessar Painel →';
            return alert('Senha incorreta! Se esqueceu, peça ao professor para resetar sua senha.');
        }
    }
    
    const t = turmasPublicas.find(x => x.id === tid);
    const a = t.alunos.find(x => x.id === aid);
    
    ALUNO.id = a.id; ALUNO.nome = a.nome; ALUNO.turmaId = t.id; ALUNO.turmaNome = t.nome; ALUNO.disciplina = t.disc || 'Geral'; ALUNO.atividadesOffline = a.atividades || {};
    
    localStorage.setItem('aluno_lms_sessao', JSON.stringify(ALUNO));
    document.getElementById('btn-login-aluno').disabled = false;
    abrirMural();
};

window.alterarMinhaSenha = async function() {
    const atual = prompt('Digite sua senha (PIN) atual:');
    if(atual === null) return;
    if(atual !== ALUNO.realPin) return alert('Senha atual incorreta.');
    
    const nova = prompt('Digite a nova senha de 4 números:');
    if(!nova || nova.length < 4) return alert('A nova senha deve ter 4 números.');
    
    try {
        await setDoc(doc(_db, 'lms_senhas', ALUNO.id), { pin: nova });
        ALUNO.realPin = nova;
        localStorage.setItem('aluno_lms_sessao', JSON.stringify(ALUNO));
        alert('Senha alterada com sucesso!');
    } catch(e) { alert('Erro ao alterar a senha. Verifique sua conexão.'); }
};

window.sair = function(){
    localStorage.removeItem('aluno_lms_sessao');
    ALUNO = { id: null, nome: '', turmaId: '', turmaNome: '', disciplina: '', realPin: '', atividadesOffline: {} };
    document.getElementById('sel-aluno').value = '';
    document.getElementById('aluno-pin').value = '';
    document.getElementById('box-pin').style.display = 'none';
    document.getElementById('btn-login-aluno').style.display = 'none';
    mostrarTela('tela-login');
};

async function abrirMural(){
    document.getElementById('mural-nome').textContent = ALUNO.nome.split(' ')[0];
    document.getElementById('mural-turma').textContent = ALUNO.turmaNome;
    mostrarTela('tela-mural');
    
    document.getElementById('mural-loading').style.display = 'block';
    document.getElementById('mural-conteudo').style.display = 'none';
    
    const turmaDB = turmasPublicas.find(x => x.id === ALUNO.turmaId);
    
    if(turmaDB && turmaDB.checklists && turmaDB.checklists.length > 0){
        document.getElementById('sec-checklist').style.display = 'block';
        const progresso = JSON.parse(localStorage.getItem('aluno_checks_' + ALUNO.id) || '{}');
        document.getElementById('lista-checklists').innerHTML = turmaDB.checklists.map(c => {
            const isFeito = !!progresso[c.id];
            return `<div class="chk-item ${isFeito ? 'feito' : ''}" onclick="window.toggleChecklist('${c.id}', this)"><div class="chk-box">${isFeito ? '✓' : ''}</div><span style="font-size:14px;font-weight:600">${c.texto}</span></div>`;
        }).join('');
    } else document.getElementById('sec-checklist').style.display = 'none';

    if(turmaDB && turmaDB.materiais && turmaDB.materiais.length > 0){
        document.getElementById('sec-materiais').style.display = 'block';
        document.getElementById('lista-materiais').innerHTML = turmaDB.materiais.map(m => `<div class="mat-card"><div><strong style="font-size:14px;color:var(--text)">${m.titulo}</strong></div><button class="btn bp" style="width:auto;padding:8px 15px;font-size:12px;border-radius:8px" onclick="window.open('${m.link}', '_blank')">Abrir 📄</button></div>`).join('');
    } else document.getElementById('sec-materiais').style.display = 'none';

    try {
        const snapMeta = await getDoc(doc(_db, 'publico', 'atividades_meta'));
        let htmlBoletim = '';
        if(snapMeta.exists() && snapMeta.data().meta) {
            metadadosAtividades = JSON.parse(snapMeta.data().meta);
            const profTurmaAtiv = metadadosAtividades[ALUNO.turmaId] || [];
            
            profTurmaAtiv.forEach(av => {
                const reg = ALUNO.atividadesOffline[av.id];
                if(reg) {
                    let st = av.tipo === 'visto' ? (reg.visto ? '<span style="color:green;font-weight:bold">Visto ✅</span>' : '<span style="color:var(--muted)">Pendente</span>') : (reg.nota != null ? `<span style="color:var(--verde);font-weight:bold">Nota: ${reg.nota}</span>` : '<span style="color:var(--muted)">Aguardando nota</span>');
                    htmlBoletim += `<div class="boletim-row"><span>📝 ${av.nome}</span> <span>${st}</span></div>`;
                }
            });
        }
        
        const qRes = query(collection(_db, 'quiz_resultados'), where('alunoId', '==', ALUNO.id));
        const snapRes = await getDocs(qRes);
        snapRes.forEach(doc => {
            const r = doc.data();
            htmlBoletim += `<div class="boletim-row"><span>🚀 ${r.tituloProva}</span> <span><span style="color:${r.placar >= 70 ? 'green' : 'red'};font-weight:bold">${r.placar}%</span></span></div>`;
        });
        
        if(htmlBoletim !== '') {
            document.getElementById('sec-notas').style.display = 'block';
            document.getElementById('lista-notas').innerHTML = htmlBoletim;
        } else {
            document.getElementById('sec-notas').style.display = 'none';
        }

        const snapProvas = await getDoc(doc(_db, 'publico', 'provas'));
        provasPublicadas = [];
        if(snapProvas.exists() && snapProvas.data().provas) provasPublicadas = JSON.parse(snapProvas.data().provas);
        
        document.getElementById('mural-loading').style.display = 'none';
        document.getElementById('mural-conteudo').style.display = 'block';
        
        const listaProvas = document.getElementById('lista-provas');
        if(provasPublicadas.length === 0){
            listaProvas.innerHTML = `<div style="text-align:center;padding:20px;background:#fff;border-radius:12px;border:1px dashed var(--border);color:var(--muted)">Nenhuma avaliação pendente.</div>`;
            return;
        }
        
        provasPublicadas.sort((a,b)=>b.criadoEm.localeCompare(a.criadoEm));
        listaProvas.innerHTML = provasPublicadas.map(p => `<div class="prova-card" onclick="window.iniciarProva('${p.id}')"><div style="display:flex;align-items:center;flex:1"><div class="prova-icon">📝</div><div><strong style="font-size:15px;color:var(--verde);display:block;margin-bottom:2px">${p.titulo}</strong><span style="font-size:12px;color:var(--muted)">${p.perguntas.length} Questões</span></div></div><div style="font-weight:800;color:var(--verde2);font-size:16px">→</div></div>`).join('');
        
    } catch(e) { document.getElementById('mural-loading').innerHTML = '<span style="color:red">Erro ao carregar as provas e notas.</span>'; }
}

window.toggleChecklist = function(idCheck, elemento){
    const key = 'aluno_checks_' + ALUNO.id;
    let progresso = JSON.parse(localStorage.getItem(key) || '{}');
    if(progresso[idCheck]){ delete progresso[idCheck]; elemento.classList.remove('feito'); elemento.querySelector('.chk-box').innerHTML = ''; } 
    else { progresso[idCheck] = true; elemento.classList.add('feito'); elemento.querySelector('.chk-box').innerHTML = '✓'; }
    localStorage.setItem(key, JSON.stringify(progresso));
};

window.iniciarProva = function(id){
    provaAtual = provasPublicadas.find(x => x.id === id);
    if(!provaAtual) return;
    
    anexosProva = {}; 
    document.getElementById('prova-titulo').textContent = provaAtual.titulo;
    document.getElementById('feedback_foto_global').innerHTML = ''; 
    
    const container = document.getElementById('prova-questoes');
    
    container.innerHTML = provaAtual.perguntas.map((q, i) => {
        let html = `<div class="q-box" id="qbox-${i}"><div class="q-enum">${i+1}. ${q.enunciado}</div>`;
        if(q.tipo === 'multipla'){
            html += `<div class="opcoes-container" data-qidx="${i}">`;
            q.alternativas.forEach((alt, altIdx) => { html += `<label class="alt-label"><input type="radio" name="resp_${i}" value="${altIdx}"/><span style="font-size:15px;line-height:1.4;color:var(--text);margin-top:2px">${alt}</span></label>`; });
            html += `</div>`;
        } else {
            html += `<textarea id="resp_${i}" placeholder="Escreva a sua resposta..."></textarea>`;
            html += `<div style="margin-top:10px; display:flex; align-items:center; gap:10px; flex-wrap:wrap">
                        <label style="background:var(--light); border:1px solid var(--border); padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:bold; color:var(--text); font-size:12px; display:flex; align-items:center; gap:5px; margin:0;">
                            📷 Anexar Foto da Questão
                            <input type="file" accept="image/*" capture="environment" style="display:none" onchange="window.comprimirImagem(this, ${i})">
                        </label>
                        <span id="feedback_foto_${i}" style="font-size:12px; font-weight:bold;"></span>
                     </div>`;
        }
        html += `</div>`; return html;
    }).join('');
    
    document.getElementById('btn-enviar').disabled = false;
    document.getElementById('btn-enviar').innerHTML = 'Entregar Avaliação ✅';
    mostrarTela('tela-prova'); window.scrollTo(0,0);
};

window.voltarMural = function(){
    if(confirm('Tem certeza? Suas respostas não salvas serão perdidas.')){ abrirMural(); }
};

window.comprimirImagem = function(input, qIdx) {
    const file = input.files[0];
    if(!file) return;
    
    const feedback = document.getElementById(`feedback_foto_${qIdx}`);
    feedback.innerHTML = '<span style="color:var(--ouro)">Comprimindo foto... ⏳</span>';
    
    const reader = new FileReader();
    reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
            let width = img.width; let height = img.height;

            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }

            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.6); 
            anexosProva[qIdx] = dataUrl;
            feedback.innerHTML = '<span style="color:var(--verde)">✅ Foto anexada com sucesso!</span>';
        }
        img.src = event.target.result;
    }
    reader.readAsDataURL(file);
};

window.enviarProva = async function(){
    let todasRespondidas = true; let acertosME = 0; let totalME = 0;
    let temasOk = []; let temasFragos = []; let dissertativas = []; let mcLog = [];

    provaAtual.perguntas.forEach((q, i) => {
        if(q.tipo === 'multipla'){
            totalME++;
            const radios = document.getElementsByName(`resp_${i}`);
            let respondida = false; let val = null; let textoResp = '';
            for(let r of radios){ if(r.checked){ respondida = true; val = parseInt(r.value); textoResp = q.alternativas[val]; break; } }
            if(!respondida) todasRespondidas = false;
            
            const isCorrect = (val === q.gabarito);
            if(isCorrect){ acertosME++; temasOk.push(q.enunciado.substring(0, 30) + '...'); } 
            else { temasFragos.push(q.enunciado.substring(0, 30) + '...'); }
            mcLog.push({ enunciado: q.enunciado, respostaAluno: textoResp || 'Em branco', correto: isCorrect });
        } else {
            const txtArea = document.getElementById(`resp_${i}`);
            const val = txtArea.value.trim();
            if(!val && !anexosProva[i]) todasRespondidas = false;
            
            dissertativas.push({ 
                enunciado: q.enunciado, 
                respostaAluno: val || '',
                anexo: anexosProva[i] || null
            });
        }
    });

    if(anexosProva['global']) {
        dissertativas.push({ enunciado: "📷 Foto Extra (Caderno/Rascunho)", respostaAluno: "Anexo livre do aluno.", anexo: anexosProva['global'] });
    }

    if(!todasRespondidas){ alert('Por favor, preencha o texto (ou escolha a opção) ou anexe uma foto em todas as questões antes de entregar.'); return; }

    const placar = totalME > 0 ? Math.round((acertosME / totalME) * 100) : 100;
    const payload = {
        provaId: provaAtual.id, tituloProva: provaAtual.titulo, alunoId: ALUNO.id, nome: ALUNO.nome,
        turma: ALUNO.turmaNome, disciplina: ALUNO.disciplina, placar: placar, acertos: acertosME, total: totalME,
        temasOk: temasOk, temasFragos: temasFragos, respostasMC: mcLog, dissertativas: dissertativas,
        dataHora: new Date().toISOString()
    };

    document.getElementById('btn-enviar').disabled = true;
    document.getElementById('btn-enviar').innerHTML = '<div class="spinner" style="width:20px;height:20px;margin:0;border-width:2px"></div> Enviando a sua prova...';

    try {
        await addDoc(collection(_db, 'quiz_resultados'), payload);
        mostrarTela('tela-sucesso'); window.scrollTo(0,0);
    } catch(e) {
        alert('Erro de conexão ao enviar a prova. Verifique a internet.');
        document.getElementById('btn-enviar').disabled = false; document.getElementById('btn-enviar').innerHTML = 'Entregar Avaliação ✅';
    }
};

function mostrarTela(id){ document.querySelectorAll('.container').forEach(c => c.classList.remove('act')); document.getElementById(id).classList.add('act'); }
</script>

<style>
.boletim-row { display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #eee; font-size:14px; align-items:center;}
.boletim-row:last-child { border-bottom: none; }
</style>
